<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS.ge — კურსების კატალოგი</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin-top: 64px; }

    /* HERO */
    .hero {
      padding: 5rem 2rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(108,99,255,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-bg);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 13px;
      color: var(--accent2);
      margin-bottom: 1.25rem;
    }
    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .hero-title span { color: var(--accent2); }
    .hero-sub {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto 2rem;
    }
    .hero-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }
    .hero-stat { text-align: center; }
    .hero-stat-num {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
    }
    .hero-stat-label { font-size: 13px; color: var(--muted); }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1rem 2rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: var(--font-body);
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg2); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .search-box {
      margin-left: auto;
      position: relative;
    }
    .search-box input {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 7px 16px 7px 36px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
    }

    /* CATALOG GRID */
    .catalog { padding: 2rem; }
    .catalog-count {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    /* COURSE CARD */
    .course-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all 0.25s;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .course-card:hover {
      border-color: rgba(108,99,255,0.3);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35), var(--glow);
    }
    .course-thumb {
      height: 130px;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .course-level {
      position: absolute;
      top: 12px; right: 12px;
    }
    .course-body { padding: 1.1rem; }
    .course-title {
      font-family: var(--font-head);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .course-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .course-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }
    .course-meta-item { display: flex; align-items: center; gap: 4px; }
    .course-footer {
      padding: 0.75rem 1.1rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .course-enrolled-count { font-size: 12px; color: var(--muted); }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state h3 { font-family: var(--font-head); font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <!-- HERO -->
  <section class="hero fade-in">
    <div class="hero-eyebrow">✦ 2024 — სწავლების ახალი ეპოქა</div>
    <h1 class="hero-title">ისწავლე.<br>გაიზარდე.<br><span>შექმენი.</span></h1>
    <p class="hero-sub">პრაქტიკული კურსები პროგრამირებაში, დიზაინსა და ტექნოლოგიებში — ქართულად.</p>
    <div class="hero-actions">
      <a href="#catalog" class="btn btn-primary btn-lg">კურსების ნახვა →</a>
      <a href="auth.html" class="btn btn-ghost btn-lg">უფასო რეგისტრაცია</a>
    </div>
    <div class="hero-stats">
      <div class="hero-stat fade-in fade-in-delay-1">
        <div class="hero-stat-num" id="stat-courses">0</div>
        <div class="hero-stat-label">კურსი</div>
      </div>
      <div class="hero-stat fade-in fade-in-delay-2">
        <div class="hero-stat-num" id="stat-students">0</div>
        <div class="hero-stat-label">სტუდენტი</div>
      </div>
      <div class="hero-stat fade-in fade-in-delay-3">
        <div class="hero-stat-num" id="stat-hours">0</div>
        <div class="hero-stat-label">სასწავლო საათი</div>
      </div>
    </div>
  </section>

  <!-- FILTER -->
  <div class="filter-bar" id="catalog">
    <button class="filter-btn active" onclick="setFilter('all', this)">ყველა</button>
    <button class="filter-btn" onclick="setFilter('frontend', this)">Frontend</button>
    <button class="filter-btn" onclick="setFilter('backend',  this)">Backend</button>
    <button class="filter-btn" onclick="setFilter('data',     this)">Data Science</button>
    <button class="filter-btn" onclick="setFilter('design',   this)">Design</button>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="კურსის ძებნა..." oninput="renderCatalog()">
    </div>
  </div>

  <!-- CATALOG -->
  <div class="catalog">
    <div class="catalog-count" id="catalog-count"></div>
    <div class="grid-auto" id="course-grid"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderNavbar({ activePage: 'home' });

    let activeFilter = 'all';

    // Animate stats
    function animateCount(id, target, suffix = '') {
      const el = document.getElementById(id);
      let current = 0;
      const step  = Math.ceil(target / 40);
      const timer = setInterval(() => {
        current = Math.min(current + step, target);
        el.textContent = current.toLocaleString() + suffix;
        if (current >= target) clearInterval(timer);
      }, 30);
    }

    function initStats() {
      const courses  = Courses.all();
      const total    = courses.reduce((s, c) => s + c.enrolled, 0);
      const hours    = courses.reduce((s, c) => s + parseInt(c.duration), 0);
      animateCount('stat-courses',  courses.length);
      animateCount('stat-students', total);
      animateCount('stat-hours',    hours);
    }

    function setFilter(cat, btn) {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCatalog();
    }

    function renderCatalog() {
      const query = document.getElementById('search-input').value.toLowerCase();
      let courses  = Courses.all();

      if (activeFilter !== 'all') courses = courses.filter(c => c.category === activeFilter);
      if (query) courses = courses.filter(c =>
        c.title.toLowerCase().includes(query) || c.description.toLowerCase().includes(query)
      );

      const user = Auth.getUser();
      const grid = document.getElementById('course-grid');
      document.getElementById('catalog-count').textContent = `${courses.length} კურსი ნაპოვნია`;

      if (!courses.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="icon">🔍</div>
            <h3>კურსი ვერ მოიძებნა</h3>
            <p>სცადეთ სხვა ძებნის სიტყვა</p>
          </div>`;
        return;
      }

      grid.innerHTML = courses.map((c, i) => {
        const enrolled = user && Courses.isEnrolled(user.id, c.id);
        return `
        <a href="lesson.html?course=${c.id}" class="course-card fade-in" style="animation-delay:${i * 0.06}s">
          <div class="course-thumb">
            ${c.thumbnail}
            <span class="badge badge-muted course-level">${c.level}</span>
          </div>
          <div class="course-body">
            <div class="course-title">${c.title}</div>
            <div class="course-desc">${c.description}</div>
            <div class="course-meta">
              <span class="course-meta-item">📚 ${c.lessons} გაკვეთილი</span>
              <span class="course-meta-item">⏱ ${c.duration}</span>
            </div>
          </div>
          <div class="course-footer">
            <span class="course-enrolled-count">👤 ${c.enrolled} სტუდენტი</span>
            ${enrolled
              ? '<span class="badge badge-green">✓ დარეგისტრირებული</span>'
              : '<span class="badge badge-accent">გახსნა →</span>'
            }
          </div>
        </a>`;
      }).join('');
    }

    initStats();
    renderCatalog();
  </script>
</body>
</html>
